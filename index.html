<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlienX • Atlantische Krijger</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    overflow: hidden;
    font-family: 'Cinzel', serif;
    color: white;
}

/* 👽 AlienX achtergrond */
.alien-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: 
        linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
        url('assets/alienx.png');
    background-size: cover;
    background-position: center;
    opacity: 0.25;
    filter: brightness(0.6) contrast(1.3);
    z-index: 1;
}

/* 🌫 Mist overlay */
.mist {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
    animation: mistMove 20s linear infinite;
    z-index: 2;
}

@keyframes mistMove {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
}

/* 🔱 Naam */
.name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 6rem;
    letter-spacing: 8px;
    color: #7fffd4;
    text-shadow:
        0 0 10px rgba(0,255,255,0.6),
        0 0 40px rgba(0,255,255,0.4),
        0 0 80px rgba(0,255,255,0.2);
    z-index: 5;
    animation: pulse 3s infinite alternate;
}

@keyframes pulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.06); }
}

/* 🌊 Energie aura */
.energy {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,255,0.4);
    transform: translate(-50%, -50%);
    animation: rotate 12s linear infinite;
    box-shadow: 0 0 80px rgba(0,255,255,0.3);
    z-index: 4;
}

@keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ✨ Kosmische particles */
.particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: cyan;
    border-radius: 50%;
    opacity: 0.7;
    animation: float linear infinite;
    z-index: 3;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }
    to {
        transform: translateY(-10vh);
        opacity: 1;
    }
}

/* 👁 Donkere vignette */
.vignette {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, transparent 50%, black 100%);
    z-index: 6;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="alien-bg"></div>
<div class="mist"></div>

<div class="energy"></div>
<div class="name">AlienX</div>

<div class="vignette"></div>

<script>
/* Generate particles */
for (let i = 0; i < 100; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
